<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Member - Kas Mumi Al-Badar</title>
    <link rel="stylesheet" href="style.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="apple-touch-icon" href="logo.jpeg">
</head>
<body>

<div id="page-add-member" class="page active">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="logo.jpeg" alt="Logo" class="logo-img">
            <span>Kas Mumi Al-Badar</span>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item" onclick="localStorage.setItem('kasku_open_tab','tab-dashboard')"><i class="fas fa-home"></i> Dashboard</a>
            <a href="index.html" class="nav-item" onclick="localStorage.setItem('kasku_open_tab','tab-add')"><i class="fas fa-plus-circle"></i> Tambah Transaksi</a>
            <a href="index.html" class="nav-item" onclick="localStorage.setItem('kasku_open_tab','tab-history')"><i class="fas fa-history"></i> Riwayat</a>
            <a href="index.html" class="nav-item" onclick="localStorage.setItem('kasku_open_tab','tab-report')"><i class="fas fa-chart-bar"></i> Laporan</a>
            <div class="sidebar-divider"></div>
            <a href="anggota.html" class="nav-item"><i class="fas fa-users"></i> Member</a>
            <a href="#" class="nav-item active"><i class="fas fa-user-plus"></i> Tambah Anggota</a>
            <a href="index.html" class="nav-item" onclick="localStorage.setItem('kasku_open_tab','tab-recap')"><i class="fas fa-clipboard-check"></i> Rekap</a>
            <a href="index.html" class="nav-item" onclick="localStorage.setItem('kasku_open_tab','tab-admin')"><i class="fas fa-user-shield"></i> Panel Admin</a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span id="user-name-display">Admin</span>
                <span class="admin-badge">Admin</span>
            </div>
            <a href="#" class="nav-item logout" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Keluar</a>
        </div>
    </aside>

    <main class="main-content">
        <button class="mobile-menu" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>

        <div class="tab active" id="tab-add-member-page">
            <h2><i class="fas fa-user-plus"></i> Tambah Member Baru</h2>

            <div class="member-form-section">
                <div class="admin-card">
                    <form id="form-member" onsubmit="addMember(event)">
                        <div class="form-row">
                            <div class="input-group">
                                <label>Nama Anggota</label>
                                <input type="text" id="member-name" placeholder="Nama lengkap" required>
                            </div>
                            <div class="input-group">
                                <label>No. Telepon</label>
                                <input type="text" id="member-phone" placeholder="08xxxxxxxxxx">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="input-group">
                                <label>Kategori</label>
                                <select id="member-category" required>
                                    <option value="pelajar">Pelajar</option>
                                    <option value="kerja">Kerja</option>
                                </select>
                            </div>
                            <div class="input-group">
                                <label>Iuran Kas per Bulan (Rp)</label>
                                <input type="number" id="member-amount" placeholder="10000" min="0" value="10000" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary"><i class="fas fa-plus"></i> Tambah Anggota</button>
                    </form>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- MODAL EDIT ANGGOTA -->
<div id="edit-member-modal" class="modal-overlay" onclick="if(event.target===this)closeEditMember()">
    <div class="modal-content">
        <div class="modal-header">
            <h3><i class="fas fa-user-edit"></i> Edit Anggota</h3>
            <button class="modal-close" onclick="closeEditMember()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <form id="form-edit-member" onsubmit="saveEditMember(event)">
                <input type="hidden" id="edit-member-id">
                <div class="input-group">
                    <label>Nama Anggota</label>
                    <input type="text" id="edit-member-name" required>
                </div>
                <div class="input-group">
                    <label>No. Telepon</label>
                    <input type="text" id="edit-member-phone" placeholder="08xxxxxxxxxx">
                </div>
                <div class="input-group">
                    <label>Kategori</label>
                    <select id="edit-member-category" required>
                        <option value="pelajar">Pelajar</option>
                        <option value="kerja">Kerja</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Iuran Kas per Bulan (Rp)</label>
                    <input type="number" id="edit-member-amount" min="0" required>
                </div>
                <button type="submit" class="btn-primary" style="width:100%;justify-content:center;margin-top:8px"><i class="fas fa-save"></i> Simpan Perubahan</button>
            </form>
        </div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="script.js?v=11"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(regs) {
    regs.forEach(function(r) { r.unregister(); });
  });
}

document.addEventListener('DOMContentLoaded', () => {
    initDefaultAdmin();
    initDefaultMembers();
    if (!hasAdmin()) {
        window.location.href = 'index.html';
        return;
    }
    currentUser = getAdmin();
    document.getElementById('user-name-display').textContent = currentUser.name;
});
</script>
</body>
</html>
